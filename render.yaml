services:
  - type: web
    name: college-erp-app
    env: node
    buildCommand: "cd college-erp-frontend && npm install && npm run build && cd ../college-erp-backend && npm install"
    startCommand: "cd college-erp-backend && npm start"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: college-erp-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

databases:
  - name: college-erp-db
    databaseName: collegeerp
    user: erpuser
    plan: free
